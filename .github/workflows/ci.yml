name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: |
          files=$(find . -name '*.go' | sort)
          [ -z "$files" ] || gofmt -l $files | tee /tmp/gofmt.out
          test ! -s /tmp/gofmt.out

      - name: Run tests
        run: go test ./...
